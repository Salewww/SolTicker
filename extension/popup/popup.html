<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SolTicker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      width: 380px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e4e4e7;
      overflow-x: hidden;
    }

    .header {
      padding: 16px 20px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-bottom: 1px solid #2a2a3e;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header img { width: 28px; height: 28px; border-radius: 6px; }
    .header h1 { font-size: 16px; font-weight: 700; color: #fff; }
    .header .badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #22c55e20;
      color: #22c55e;
      font-weight: 600;
    }

    .search-box {
      padding: 16px 20px;
      border-bottom: 1px solid #1e1e2e;
    }

    .search-box input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #2a2a3e;
      border-radius: 8px;
      background: #12121a;
      color: #e4e4e7;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box input:focus { border-color: #6366f1; }
    .search-box input::placeholder { color: #52525b; }

    .search-box .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .search-box button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-secondary {
      background: #1e1e2e;
      color: #a1a1aa;
      border: 1px solid #2a2a3e;
    }
    .btn-secondary:hover { background: #2a2a3e; }

    .current-product {
      padding: 12px 20px;
      background: #12121a;
      border-bottom: 1px solid #1e1e2e;
      display: none;
    }

    .current-product.visible { display: block; }
    .current-product .label { font-size: 10px; color: #71717a; text-transform: uppercase; letter-spacing: 0.5px; }
    .current-product .title { font-size: 13px; font-weight: 600; margin-top: 4px; color: #fff; }
    .current-product .price { font-size: 18px; font-weight: 700; color: #22c55e; margin-top: 2px; }

    .results { padding: 12px 20px; max-height: 300px; overflow-y: auto; }

    .results .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #71717a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      margin-top: 4px;
    }

    .result-card {
      padding: 12px;
      background: #12121a;
      border: 1px solid #1e1e2e;
      border-radius: 8px;
      margin-bottom: 8px;
      transition: border-color 0.2s;
    }

    .result-card:hover { border-color: #6366f1; }

    .result-card .platform {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .platform.amazon { color: #ff9900; }
    .platform.shopify { color: #96bf48; }
    .platform.tiktok { color: #ff0050; }

    .result-card .product-title {
      font-size: 13px;
      font-weight: 500;
      color: #e4e4e7;
      line-height: 1.4;
      margin-bottom: 6px;
    }

    .result-card .product-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .result-card .price {
      font-size: 16px;
      font-weight: 700;
      color: #22c55e;
    }

    .result-card .original-price {
      font-size: 12px;
      color: #71717a;
      text-decoration: line-through;
      margin-left: 6px;
    }

    .result-card .sold {
      font-size: 11px;
      color: #a1a1aa;
    }

    .result-card .rating {
      font-size: 11px;
      color: #fbbf24;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #52525b;
    }

    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 13px; line-height: 1.5; }

    .loading {
      text-align: center;
      padding: 30px;
      display: none;
    }

    .loading.visible { display: block; }
    .loading .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid #2a2a3e;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      padding: 12px 20px;
      border-top: 1px solid #1e1e2e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: #52525b;
    }

    .footer a {
      color: #6366f1;
      text-decoration: none;
    }

    .footer a:hover { text-decoration: underline; }

    .tier-badge {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
    }

    .tier-badge.free { background: #2a2a3e; color: #a1a1aa; }
    .tier-badge.basic { background: #6366f120; color: #6366f1; }
    .tier-badge.pro { background: #fbbf2420; color: #fbbf24; }

    .upgrade-banner {
      margin: 12px 20px;
      padding: 12px;
      background: linear-gradient(135deg, #6366f120, #8b5cf620);
      border: 1px solid #6366f140;
      border-radius: 8px;
      text-align: center;
      display: none;
    }

    .upgrade-banner.visible { display: block; }
    .upgrade-banner p { font-size: 12px; color: #a5b4fc; margin-bottom: 8px; }
    .upgrade-banner a {
      display: inline-block;
      padding: 6px 16px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="header">
    <div style="width:28px;height:28px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;">📊</div>
    <h1>SolTicker</h1>
    <span class="badge" id="tierBadge">FREE</span>
  </div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search any product..." />
    <div class="btn-row">
      <button class="btn-primary" id="searchBtn" onclick="searchProducts()">🔍 Search All</button>
      <button class="btn-secondary" id="autoBtn" onclick="autoDetect()">⚡ Auto-Detect</button>
    </div>
  </div>

  <div class="current-product" id="currentProduct">
    <div class="label">Current Page</div>
    <div class="title" id="currentTitle">—</div>
    <div class="price" id="currentPrice">—</div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div style="font-size:13px;color:#71717a;">Searching across platforms...</div>
  </div>

  <div class="upgrade-banner" id="upgradeBanner">
    <p>⚡ Upgrade for unlimited lookups + price history</p>
    <a href="https://solticker.app/pricing" target="_blank">Upgrade →</a>
  </div>

  <div class="results" id="results">
    <div class="empty-state">
      <div class="icon">🔍</div>
      <p>Search any product to see pricing across Amazon, Shopify, and TikTok Shop</p>
    </div>
  </div>

  <div class="footer">
    <span id="lookupCount">5 lookups left today</span>
    <a href="https://solticker.app" target="_blank">solticker.app</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
